name: Collect Macro Data

on:
  schedule:
    # 5분마다, 평일 24시간 (Brent유/USD/KRW 24시간 거래)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect API
        run: |
          curl -s --max-time 30 "https://26utong.vercel.app/api/collect" || true
