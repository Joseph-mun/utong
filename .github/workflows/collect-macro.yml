name: Collect Macro Data

on:
  schedule:
    # 5분마다 (KST 장중 08:50~15:40 = UTC 23:50~06:40)
    - cron: '*/5 0-7 * * 1-5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect API
        run: |
          curl -s --max-time 30 "https://26utong.vercel.app/api/collect" || true
