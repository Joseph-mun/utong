name: Collect Macro Data

on:
  schedule:
    # 5분마다, 평일 24시간 (Brent유/USD/KRW 24시간 거래)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch live prices (Investing.com → Redis)
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          pip install -q requests beautifulsoup4
          python3 scripts/fetch_macro_live.py
      - name: Call collect API
        run: |
          curl -sf --max-time 30 "https://26utong.vercel.app/api/collect" || echo "Warning: collect API call failed"
